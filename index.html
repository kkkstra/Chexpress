<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>毕业快递价格对比</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="title-row">
          <div>
            <p class="eyebrow">Graduation Express</p>
            <h1>毕业快递比价</h1>
          </div>
          <div class="title-actions">
            <a class="github-link" href="https://github.com/kkkstra/Chexpress" target="_blank" rel="noreferrer" aria-label="打开 GitHub 仓库 kkkstra/Chexpress">
              <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                <path d="M8 0C3.58 0 0 3.67 0 8.2c0 3.62 2.29 6.69 5.47 7.78.4.08.55-.18.55-.4 0-.2-.01-.85-.01-1.54-2.01.38-2.53-.5-2.69-.96-.09-.24-.48-.97-.82-1.17-.28-.15-.68-.52-.01-.53.63-.01 1.08.59 1.23.84.72 1.24 1.87.89 2.33.68.07-.53.28-.89.51-1.09-1.78-.21-3.64-.91-3.64-4.04 0-.89.31-1.62.82-2.19-.08-.21-.36-1.04.08-2.16 0 0 .67-.22 2.2.84A7.42 7.42 0 0 1 8 3.98c.68 0 1.36.09 2 .28 1.53-1.06 2.2-.84 2.2-.84.44 1.12.16 1.95.08 2.16.51.57.82 1.3.82 2.19 0 3.14-1.87 3.83-3.65 4.04.29.25.54.75.54 1.53 0 1.1-.01 1.98-.01 2.25 0 .22.15.48.55.4A8.13 8.13 0 0 0 16 8.2C16 3.67 12.42 0 8 0Z"></path>
              </svg>
            </a>
            <button id="sourceBtn" class="source-btn" type="button">价格表</button>
          </div>
        </div>
        <div class="controls" aria-label="价格查询条件">
          <label class="field combo-field region-field">
            <span>地区</span>
            <div class="control-row region-row">
              <select id="provinceSelect"></select>
              <select id="citySelect"></select>
            </div>
          </label>
          <label class="field combo-field weight-field">
            <span>重量</span>
            <div class="weight-entry">
              <input id="weightInput" type="text" inputmode="decimal" autocomplete="off" min="0.5" step="0.5" value="20">
              <button id="unitToggle" class="unit-toggle" type="button" aria-label="切换重量单位">千克</button>
            </div>
          </label>
        </div>
      </header>

      <section class="compare-grid">
        <div class="chart-wrap">
          <div class="chart-head">
            <div class="legend" id="legend"></div>
          </div>
          <svg id="priceChart" role="img" aria-label="三家快递不同重量总运费折线图"></svg>
        </div>

        <aside class="side-panel">
          <div class="current-weight">
            <span>当前重量</span>
            <strong id="currentWeight">20 kg</strong>
          </div>
          <div id="priceCards" class="price-cards"></div>
        </aside>
      </section>
      <p class="disclaimer">价格根据现场价目表图片整理，仅供参考；实际寄件价格、计费重量、优惠与服务规则请以下单页面或现场网点确认为准。</p>
    </main>

    <div id="sourceDialog" class="source-dialog" hidden>
      <div class="source-backdrop" data-close-source></div>
      <section class="source-sheet" role="dialog" aria-modal="true" aria-labelledby="sourceTitle">
        <header class="source-header">
          <div>
            <p class="eyebrow">Source Tables</p>
            <h2 id="sourceTitle">原始价格表</h2>
          </div>
          <button id="sourceClose" class="icon-btn" type="button" aria-label="关闭来源表">×</button>
        </header>
        <div id="sourceTabs" class="source-tabs" role="tablist" aria-label="快递公司"></div>
        <div class="source-table-wrap">
          <table id="sourceTable" class="source-table"></table>
        </div>
      </section>
    </div>

    <div id="disclaimerDialog" class="notice-dialog" hidden>
      <div class="notice-backdrop"></div>
      <section class="notice-card" role="dialog" aria-modal="true" aria-labelledby="noticeTitle">
        <p class="eyebrow">Notice</p>
        <h2 id="noticeTitle">价格提示</h2>
        <p>价格根据现场价目表图片整理，仅供参考；实际寄件价格、计费重量、优惠与服务规则请以下单页面或现场网点确认为准。</p>
        <button id="disclaimerConfirm" class="notice-confirm" type="button">我知道了</button>
      </section>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
